<!-- HTML V2.1 03072026 -->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termalis</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <link rel="stylesheet" href="styles.css" />
    <script src="utils.js" defer></script>
    <script src="index.js" defer></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 10px;
      }
      .mobile-card {
        background: white;
        border-radius: 15px;
        padding: 25px 15px;
        max-width: 450px;
        margin: 20px auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        text-align: center;
      }
      /* Contenedor flexible para alinear el número y el símbolo de grado al centro */
      .temp-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        font-size: 5.5em;
        font-weight: bold;
        margin: 15px 0;
        color: #1a237e; /* Azul oscuro estético para el número */
        letter-spacing: -2px;
      }
      .temp-degree {
        font-size: 0.35em;
        margin-left: 2px;
        margin-top: 10px;
      }
      /* Barra de estado tipo la de humedad de referencia */
      .status-bar {
        background-color: #e3f2fd;
        border: 1px solid #bbdefb;
        border-radius: 10px;
        padding: 12px 10px;
        margin: 20px 0;
        color: #1565c0;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .status-bar img {
        max-height: 32px; /* Más compacta para integrarse en la línea */
      }
      .version-box {
        background: #f0f0f0;
        border-radius: 8px;
        padding: 8px;
        font-size: 0.85em;
        color: #555;
        margin: 15px 0;
      }
      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 25px;
        justify-content: space-between;
      }
      .btn-nav {
        flex: 1;
        padding: 12px 8px;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        font-size: 0.9em;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }
      .btn-orange { background-color: #ff9800; }
      .btn-green { background-color: #2ecc71; }
      .btn-blue { background-color: #00a2ff; }
      .hide { display: none; }
    </style>
  </head>
  <body>

    <div class="grid">
      <div class="container mobile-card">
        
        <!-- Logos -->
        <h2 id="termoNasaLogo" style="font-style: italic; font-size: 1.8em; margin: 5px 0;">
          <span style="color: red">Termo</span>NASA
        </h2>
        <h2 id="helaNasaLogo" class="hide" style="font-style: italic; font-size: 1.8em; margin: 5px 0;">
          <span style="color: blue">Hela</span>NASA
        </h2>

        <!-- Temperatura Centrada con Flexbox -->
        <div class="temp-container">
          <span id="temperature">0.0</span>
          <span class="temp-degree">º</span>
        </div>

        <!-- Nueva Píldora de Estado (Reemplaza la sección vieja del motor desalineado) -->
        <div class="status-bar" id="engine">
          <div style="display: flex; align-items: center;">
            <img src="engineOn.png" id="engineOn" class="hide pulse" />
            <img src="engineOff.png" id="engineOff" class="" />
          </div>
          <div id="dispEngineMessage" style="text-align: left; line-height: 1.2;"></div>
        </div>

        <!-- Barra de progreso / Rangos -->
        <div class="progress-bar" style="margin: 20px 0;">
          <div><span id="dispTempMin" class="pointer">0</span>º &lt;</div>
          <div class="envelope">
            <div id="box" class="box"></div>
          </div>
          <div>&gt; <span id="dispTempMax" class="pointer">0</span>º</div>
        </div>

        <!-- Info de Franja Activa y Versiones -->
        <div class="version-box">
          <div>Franja activa: <span id="dispActiveTimeSpan">Default</span><span id="dispActiveTimeForced" class="red"></span></div>
          <div style="font-size: 0.85em; margin-top: 4px; color: #888;">
            Front: v2.2.2 | Back: v<span id="dispBackendVersion">0</span>
          </div>
        </div>

        <!-- Botonera Inferior Móvil -->
        <div class="button-group">
          <a href="config.html" class="btn-nav btn-orange">⚙️ Config</a>
          <button id="btnForzarRush" class="btn-nav btn-green" onclick="toggleEngine()">🚀 Forzar RUSH</button>
          <div id="configBackend" style="flex: 1; display: block;">
            <a href="#" class="btn-nav btn-blue" style="width: 100%; box-sizing: border-box;">🤖 Automático</a>
          </div>
        </div>

      </div>
    </div>

    <script>
      function toggleEngine() {
        const engineOn = document.getElementById('engineOn');
        const engineOff = document.getElementById('engineOff');
        if(engineOn && engineOff) {
          if(engineOn.classList.contains('hide')) {
            engineOff.click();
          } else {
            engineOn.click();
          }
        }
      }
    </script>
  </body>
</html>
