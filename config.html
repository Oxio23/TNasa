<!-- Restyling Phone Mod V1.0 03072026-->

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 10px;
        color: #333;
      }
      .mobile-card {
        background: white;
        border-radius: 15px;
        padding: 20px 15px;
        max-width: 450px;
        margin: 15px auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      }
      
      /* Reloj Superior Estilizado */
      #clock {
        background: #1a237e;
        color: white;
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(26,35,126,0.2);
      }
      #clock div:first-child {
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.8;
        margin-bottom: 4px;
      }
      #displayBackendTime {
        font-size: 2em;
        font-weight: bold;
        font-variant-numeric: tabular-nums;
      }

      /* Ocultamos la fila de títulos original en móviles porque ya no es una tabla */
      .timeSpan.title {
        display: none !important;
      }

      /* Contenedor dinámico de franjas */
      #timespans {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Re-estilización COMPLETA de las tarjetas que genera config.js */
      /* El JS inyecta un div con clases .timeSpan y opcionalmente .tsSelected o .tsForced */
      .timeSpan {
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto auto;
        gap: 8px 12px;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        position: relative;
        overflow: hidden;
      }

      /* Prioridad (ID numérico) */
      .timeSpan > div:first-child {
        background: #eee;
        color: #666;
        font-weight: bold;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 0.85em;
        grid-column: 1;
        grid-row: 1;
        text-align: center;
        min-width: 20px;
      }

      /* Nombre de la franja */
      .timeSpan .name {
        font-weight: bold;
        font-size: 1.1em;
        grid-column: 2;
        grid-row: 1;
        text-align: left;
        color: #222;
      }

      /* Horarios (Inicio y Fin combinados visualmente) */
      .timeSpan .starttime, .timeSpan .endtime {
        grid-column: 2;
        grid-row: 2;
        font-size: 0.9em;
        color: #666;
      }
      /* Truco CSS para espaciar las horas si se muestran juntas */
      .timeSpan .starttime { text-align: left; }
      .timeSpan .endtime::before { content: " a "; }
      .timeSpan .endtime { margin-left: 45px; } /* Desplazamiento visual */

      /* Temperaturas Mínima y Máxima unificadas en un bloque de control */
      .timeSpan .tempmin, .timeSpan .tempmax {
        display: none; /* Las ocultamos de su texto suelto original... */
      }
      /* ...Y usamos el contenedor .force que ya trae los rangos armados "Min ~ Max" */
      .timeSpan .force {
        grid-column: 3;
        grid-row: 1;
        background: #f1f8e9;
        border: 1px solid #c5e1a5;
        color: #33691e;
        font-weight: bold;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 0.95em;
        text-align: center;
      }

      /* Switch de Activo / Estado */
      .timeSpan .enabled {
        grid-column: 3;
        grid-row: 2;
        font-size: 0.85em;
        font-weight: 600;
        text-align: center;
        color: #757575;
      }

      /* --- ESTADOS DESTACADOS (Cuando la franja está corriendo) --- */
      
      /* Franja seleccionada normalmente por el reloj */
      .timeSpan.tsSelected {
        border-color: #4caf50;
        background-color: #f1f8e9;
      }
      .timeSpan.tsSelected > div:first-child {
        background: #4caf50;
        color: white;
      }
      .timeSpan.tsSelected::after {
        content: "ACTIVA";
        position: absolute;
        top: 0;
        right: 0;
        background: #4caf50;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 2px 8px;
        border-bottom-left-radius: 8px;
      }

      /* Franja Forzada manualmente (RUSH / Prioridad máxima) */
      .timeSpan.tsForced {
        border-color: #f44336;
        background-color: #ffebee;
      }
      .timeSpan.tsForced > div:first-child {
        background: #f44336;
        color: white;
      }
      .timeSpan.tsForced .force {
        background: #f44336;
        border-color: #f44336;
        color: white;
      }
      .timeSpan.tsForced::after {
        content: "FORZADA";
        position: absolute;
        top: 0;
        right: 0;
        background: #f44336;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 2px 8px;
        border-bottom-left-radius: 8px;
      }

      /* Botón Volver flotante o inferior para no quedar atrapado */
      .btn-back {
        display: block;
        text-align: center;
        background: #e0e0e0;
        color: #333;
        text-decoration: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
        margin-top: 25px;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container mobile-card">
        
        <!-- Reloj Centralizado -->
        <div id="clock">
          <div>Hora del Servidor</div>
          <div id="displayBackendTime">0000</div>
        </div>

        <!-- Fila de títulos requerida por herencia pero oculta visualmente -->
        <div class="timeSpan title">
          <div>Prioridad</div>
          <div>Nombre</div>
          <div>Hora Inicio</div>
          <div>Hora Fin</div>
          <div>Temp Mínima</div>
          <div>Temp Máxima</div>
          <div>Activo</div>
          <div>Forzar</div>
        </div>

        <!-- El contenedor donde config.js creará las tarjetas -->
        <div id="timespans"></div>

        <!-- Enlace para regresar de forma amena al panel principal -->
        <a href="index.html" class="btn-back">⬅ Volver al Panel</a>

      </div>
    </div>
  </body>
</html>
