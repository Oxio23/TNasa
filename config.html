<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* --- Estilos Generales Móviles Integrales --- */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5 !important;
        margin: 0 !important;
        padding: 12px !important;
        color: #333 !important;
        box-sizing: border-box;
      }

      /* Reseteamos contenedores heredados del CSS viejo */
      .grid, .container {
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
      }

      /* --- Reloj Superior Fijo en su Sitio --- */
      #clock {
        background: #1a237e !important;
        border-radius: 12px !important;
        padding: 16px 10px !important;
        text-align: center !important;
        margin: 0 0 20px 0 !important;
        box-shadow: 0 4px 12px rgba(26,35,126,0.15) !important;
        width: 100% !important;
        box-sizing: border-box !important;
        display: block !important;
        height: auto !important;
      }
      #clock div:first-child {
        color: rgba(255, 255, 255, 0.75) !important;
        font-size: 0.85em !important;
        text-transform: uppercase !important;
        letter-spacing: 1.5px !important;
        margin-bottom: 4px !important;
        font-weight: 600 !important;
        background: none !important;
        width: auto !important;
      }
      #displayBackendTime {
        color: #ffffff !important;
        font-size: 2.6em !important;
        font-weight: bold !important;
        font-variant-numeric: tabular-nums !important;
        margin: 0 !important;
        padding: 0 !important;
        background: none !important;
      }

      /* Ocultamos los títulos viejos */
      .timeSpan.title {
        display: none !important;
      }

      #timespans {
        display: flex !important;
        flex-direction: column !important;
        gap: 14px !important;
        width: 100% !important;
      }

      /* --- Re-estructuración Total de la Tarjeta --- */
      .timeSpan {
        background: white !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 14px !important;
        padding: 16px !important;
        box-shadow: 0 3px 8px rgba(0,0,0,0.03) !important;
        position: relative !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
        width: 100% !important;
        height: auto !important;
        margin: 0 !important;
        
        /* Forzamos bloque vertical limpio */
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 10px !important;
      }

      /* ID numérico */
      .timeSpan > div:first-child {
        background: #e2e8f0 !important;
        color: #475569 !important;
        font-weight: 700 !important;
        border-radius: 6px !important;
        padding: 4px 10px !important;
        font-size: 0.85em !important;
        margin: 0 !important;
        width: auto !important;
        display: inline-block !important;
      }

      /* Nombre del modo */
      .timeSpan .name {
        font-weight: bold !important;
        font-size: 1.3em !important;
        color: #1e293b !important;
        margin: 0 !important;
        width: auto !important;
        display: block !important;
      }

      /* Rango de temperaturas (Min ~ Max) */
      .timeSpan .force {
        background: #f1f8e9 !important;
        border: 1px solid #c5e1a5 !important;
        color: #33691e !important;
        font-weight: bold !important;
        padding: 6px 14px !important;
        border-radius: 8px !important;
        font-size: 1.05em !important;
        margin: 4px 0 !important;
        width: auto !important;
        display: inline-block !important;
      }

      /* Contenedor forzado para el renglón de Horarios */
      /* El truco definitivo: convertimos la visualización en una línea flex horizontal continua */
      .timeSpan .starttime, 
      .timeSpan .endtime {
        font-size: 1em !important;
        color: #64748b !important;
        margin: 0 !important;
        padding: 0 !important;
        width: auto !important;
        background: none !important;
        display: inline-block !important;
        float: none !important;
      }

      .timeSpan .starttime::before {
        content: "🕒 Horario: ";
        font-weight: 500;
      }
      .timeSpan .endtime::before {
        content: " a ";
      }

      /* Botón de Estado Activo (true / false) */
      .timeSpan .enabled {
        font-weight: 600 !important;
        color: #10b981 !important;
        background: #ecfdf5 !important;
        padding: 4px 10px !important;
        border-radius: 6px !important;
        font-size: 0.85em !important;
        margin: 4px 0 0 0 !important;
        width: auto !important;
        display: inline-block !important;
        float: none !important;
      }

      /* Ocultamos los datos remanentes redundantes */
      .timeSpan .tempmin, 
      .timeSpan .tempmax {
        display: none !important;
      }

      /* --- ESTADOS SELECCIONADOS / FORZADOS --- */
      .timeSpan.tsSelected {
        border-color: #10b981 !important;
        background-color: #f6fdfa !important;
      }
      .timeSpan.tsSelected > div:first-child {
        background: #10b981 !important;
        color: white !important;
      }
      .timeSpan.tsSelected::after {
        content: "ACTIVA";
        position: absolute;
        top: 0;
        right: 0;
        background: #10b981;
        color: white;
        font-size: 0.7em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
      }

      .timeSpan.tsForced {
        border-color: #ef4444 !important;
        background-color: #fef2f2 !important;
      }
      .timeSpan.tsForced > div:first-child {
        background: #ef4444 !important;
        color: white !important;
      }
      .timeSpan.tsForced .force {
        background: #ef4444 !important;
        border-color: #ef4444 !important;
        color: white !important;
      }
      .timeSpan.tsForced::after {
        content: "FORZADA";
        position: absolute;
        top: 0;
        right: 0;
        background: #ef4444;
        color: white;
        font-size: 0.7em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
      }

      /* Botón Volver Ancho Completo */
      .btn-back {
        display: block !important;
        text-align: center !important;
        background: #e2e8f0 !important;
        color: #334155 !important;
        text-decoration: none !important;
        padding: 14px !important;
        border-radius: 12px !important;
        font-weight: bold !important;
        margin: 25px 0 10px 0 !important;
        font-size: 1em !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container">
        
        <!-- Reloj -->
        <div id="clock">
          <div>Hora del Servidor</div>
          <div id="displayBackendTime">0000</div>
        </div>

        <!-- Tabla oculta requerida por el backend -->
        <div class="timeSpan title">
          <div>Prioridad</div>
          <div>Nombre</div>
          <div>Hora Inicio</div>
          <div>Hora Fin</div>
          <div>Temp Mínima</div>
          <div>Temp Máxima</div>
          <div>Activo</div>
          <div>Forzar</div>
        </div>

        <!-- Render dinámico -->
        <div id="timespans"></div>

        <!-- Volver -->
        <a href="index.html" class="btn-back">⬅ Volver al Panel</a>

      </div>
    </div>
  </body>
</html>
