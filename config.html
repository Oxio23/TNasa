<!-- Restyling Phone Mod V1.2 03072026-->

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* --- Estilos Generales para Celular (Ancho Completo) --- */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 12px;
        color: #333;
        box-sizing: border-box;
      }

      .grid, .container {
        width: 100%;
        margin: 0;
        padding: 0;
      }

      /* --- Reloj Superior Estilizado y con Contraste --- */
      #clock {
        background: #1a237e;
        border-radius: 12px;
        padding: 18px 10px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: 0 4px 12px rgba(26,35,126,0.15);
        width: 100%;
        box-sizing: border-box;
      }
      #clock div:first-child {
        color: rgba(255, 255, 255, 0.75) !important;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 4px;
        font-weight: 600;
      }
      /* Fuerza el color blanco e impide que el script de la PC lo cambie */
      #displayBackendTime {
        color: #ffffff !important;
        font-size: 2.6em;
        font-weight: bold;
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
      }

      /* Ocultamos la cabecera vieja de la PC */
      .timeSpan.title {
        display: none !important;
      }

      /* --- Contenedor de Tarjetas al 100% del Ancho --- */
      #timespans {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
      }

      /* --- Estilo de cada Tarjeta Horaria --- */
      .timeSpan {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.03);
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        width: 100%;
        
        /* Flexbox vertical para ordenar los elementos que inyecta el JS */
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: left;
      }

      /* Fila Superior de la tarjeta (Identificador + Nombre) */
      .timeSpan > div:first-child {
        background: #e2e8f0;
        color: #475569;
        font-weight: 700;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 0.85em;
        display: inline-block;
        align-self: flex-start;
        margin: 0;
      }

      .timeSpan .name {
        font-weight: bold;
        font-size: 1.3em;
        color: #1e293b;
        margin: 0;
        line-height: 1.2;
      }

      /* Bloque del medio: Rango de Temperaturas Destacado */
      .timeSpan .force {
        background: #f1f8e9;
        border: 1px solid #c5e1a5;
        color: #33691e;
        font-weight: bold;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 1.05em;
        align-self: flex-start;
        margin: 4px 0;
      }

      /* Fila Inferior: Horas de inicio, fin y estado activo */
      .timeSpan .starttime, 
      .timeSpan .endtime, 
      .timeSpan .enabled {
        font-size: 1em;
        color: #64748b;
        display: inline-block;
        margin: 0;
      }

      /* Estilizado para agrupar las horas en un renglón legible */
      .timeSpan .starttime::before {
        content: "🕒 Horario: ";
        font-weight: 500;
      }
      .timeSpan .endtime::before {
        content: " a ";
      }

      /* Estado habilitado (true / false) al final de la tarjeta */
      .timeSpan .enabled {
        font-weight: 600;
        color: #10b981;
        background: #ecfdf5;
        padding: 3px 8px;
        border-radius: 6px;
        align-self: flex-start;
        font-size: 0.85em;
      }

      /* Ocultamos los datos sueltos que rompen el diseño */
      .timeSpan .tempmin, 
      .timeSpan .tempmax {
        display: none !important;
      }

      /* --- CONFIGURACIONES CUANDO LA FRANJA ESTÁ ACTIVA --- */
      
      /* Modo Seleccionado automáticamente por el Servidor */
      .timeSpan.tsSelected {
        border-color: #10b981;
        background-color: #f6fdfa;
        box-shadow: 0 4px 12px rgba(16,185,129,0.08);
      }
      .timeSpan.tsSelected > div:first-child {
        background: #10b981;
        color: white;
      }
      .timeSpan.tsSelected::after {
        content: "ACTIVA";
        position: absolute;
        top: 0;
        right: 0;
        background: #10b981;
        color: white;
        font-size: 0.7em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
        letter-spacing: 0.5px;
      }

      /* Modo Forzado manualmente por el usuario (RUSH) */
      .timeSpan.tsForced {
        border-color: #ef4444;
        background-color: #fef2f2;
        box-shadow: 0 4px 12px rgba(239,68,68,0.08);
      }
      .timeSpan.tsForced > div:first-child {
        background: #ef4444;
        color: white;
      }
      .timeSpan.tsForced .force {
        background: #ef4444;
        border-color: #ef4444;
        color: white;
      }
      .timeSpan.tsForced::after {
        content: "FORZADA";
        position: absolute;
        top: 0;
        right: 0;
        background: #ef4444;
        color: white;
        font-size: 0.7em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
        letter-spacing: 0.5px;
      }

      /* Botón Volver inferior ancho completo */
      .btn-back {
        display: block;
        text-align: center;
        background: #e2e8f0;
        color: #334155;
        text-decoration: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: bold;
        margin-top: 25px;
        font-size: 1em;
        width: 100%;
        box-sizing: border-box;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container">
        
        <!-- Reloj Con Contraste Asegurado -->
        <div id="clock">
          <div>Hora del Servidor</div>
          <div id="displayBackendTime">0000</div>
        </div>

        <!-- Estructura base oculta pero requerida por config.js -->
        <div class="timeSpan title">
          <div>Prioridad</div>
          <div>Nombre</div>
          <div>Hora Inicio</div>
          <div>Hora Fin</div>
          <div>Temp Mínima</div>
          <div>Temp Máxima</div>
          <div>Activo</div>
          <div>Forzar</div>
        </div>

        <!-- Inyección limpia de tarjetas -->
        <div id="timespans"></div>

        <!-- Botón de retorno cómodo -->
        <a href="index.html" class="btn-back">⬅ Volver al Panel</a>

      </div>
    </div>
  </body>
</html>
