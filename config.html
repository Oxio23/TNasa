<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
   <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 10px;
        color: #333;
      }
      .mobile-card {
        background: white;
        border-radius: 15px;
        padding: 20px 15px;
        max-width: 450px;
        margin: 15px auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      }
      
      /* Reloj Superior con Contraste Asegurado */
      #clock {
        background: #1a237e;
        border-radius: 12px;
        padding: 15px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(26,35,126,0.2);
      }
      #clock div:first-child {
        color: rgba(255, 255, 255, 0.8) !important;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      /* Forzamos el color blanco con !important para que el JS no lo pise a negro */
      #displayBackendTime {
        color: #ffffff !important;
        font-size: 2.2em;
        font-weight: bold;
        font-variant-numeric: tabular-nums;
      }

      /* Ocultamos la fila de títulos original */
      .timeSpan.title {
        display: none !important;
      }

      /* Contenedor de franjas */
      #timespans {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Rediseño de Tarjetas Flexibles */
      .timeSpan {
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        position: relative;
        overflow: hidden;
      }

      /* Fila Superior de la tarjeta: ID, Nombre y Rango */
      .timeSpan > div:nth-child(1), /* ID */
      .timeSpan .name, 
      .timeSpan .force {
        margin: 0;
      }

      /* Contenedor interno para organizar la parte de arriba */
      .timeSpan {
        padding-top: 20px;
      }
      
      /* Alineamos los elementos de arriba en una sola línea fluida */
      .timeSpan div:nth-child(2) { /* Este suele ser el contenedor o el name */
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Estilo del ID */
      .timeSpan > div:first-child {
        background: #eee;
        color: #666;
        font-weight: bold;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 0.85em;
        display: inline-block;
        align-self: flex-start;
      }

      .timeSpan .name {
        font-weight: bold;
        font-size: 1.2em;
        color: #222;
        flex-grow: 1;
        text-align: left;
      }

      /* Rango de temperaturas (Min ~ Max) */
      .timeSpan .force {
        background: #f1f8e9;
        border: 1px solid #c5e1a5;
        color: #33691e;
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.95em;
        margin-left: auto; /* Lo empuja a la derecha */
      }

      /* Fila Inferior: Horas y Estado Activo alineados perfectamente */
      /* Ocultamos los textos sueltos originales redundantes */
      .timeSpan .tempmin, .timeSpan .tempmax {
        display: none !important;
      }

      /* Forzamos a que las horas y el 'true/false' se alineen en un renglón limpio en la base */
      .timeSpan .starttime, 
      .timeSpan .endtime, 
      .timeSpan .enabled {
        display: inline-block;
        font-size: 0.95em;
        color: #555;
      }

      /* Formateo de tiempos para que no se amontonen */
      .timeSpan .starttime::before {
        content: "Horario: ";
        color: #999;
        font-size: 0.9em;
      }
      .timeSpan .endtime::before {
        content: " a ";
        color: #666;
      }
      
      /* El estado activo (true/false) lo mandamos al fondo a la derecha */
      .timeSpan .enabled {
        margin-left: auto;
        font-weight: bold;
        color: #4caf50;
      }

      /* --- ESTADOS DESTACADOS --- */
      .timeSpan.tsSelected {
        border-color: #4caf50;
        background-color: #f1f8e9;
      }
      .timeSpan.tsSelected > div:first-child {
        background: #4caf50;
        color: white;
      }
      .timeSpan.tsSelected::after {
        content: "ACTIVA";
        position: absolute;
        top: 0;
        right: 0;
        background: #4caf50;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 2px 8px;
        border-bottom-left-radius: 8px;
      }

      .timeSpan.tsForced {
        border-color: #f44336;
        background-color: #ffebee;
      }
      .timeSpan.tsForced > div:first-child {
        background: #f44336;
        color: white;
      }
      .timeSpan.tsForced .force {
        background: #f44336;
        border-color: #f44336;
        color: white;
      }
      .timeSpan.tsForced::after {
        content: "FORZADA";
        position: absolute;
        top: 0;
        right: 0;
        background: #f44336;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 2px 8px;
        border-bottom-left-radius: 8px;
      }

      .btn-back {
        display: block;
        text-align: center;
        background: #e0e0e0;
        color: #333;
        text-decoration: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
        margin-top: 25px;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container mobile-card">
        
        <!-- Reloj Centralizado -->
        <div id="clock">
          <div>Hora del Servidor</div>
          <div id="displayBackendTime">0000</div>
        </div>

        <!-- Fila de títulos requerida por herencia pero oculta visualmente -->
        <div class="timeSpan title">
          <div>Prioridad</div>
          <div>Nombre</div>
          <div>Hora Inicio</div>
          <div>Hora Fin</div>
          <div>Temp Mínima</div>
          <div>Temp Máxima</div>
          <div>Activo</div>
          <div>Forzar</div>
        </div>

        <!-- El contenedor donde config.js creará las tarjetas -->
        <div id="timespans"></div>

        <!-- Enlace para regresar de forma amena al panel principal -->
        <a href="index.html" class="btn-back">⬅ Volver al Panel</a>

      </div>
    </div>
  </body>
</html>
