<!-- Restyling Phone Mod V3.1 - Deepseek 05072026 --> 

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* --- BASE --- */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5 !important;
            margin: 0 !important;
            padding: 20px 10px !important;
            color: #333 !important;
            display: flex !important;
            justify-content: center !important;
        }

        .grid {
            width: 80% !important;
            max-width: 500px !important;
            margin: 0 auto !important;
            display: block !important;
        }
        .container {
            width: 100% !important;
            display: block !important;
        }

        /* --- RELOJ --- */
        #clock {
            background: #1a237e !important;
            border-radius: 12px !important;
            padding: 16px 10px !important;
            text-align: center !important;
            margin: 0 0 20px 0 !important;
            box-shadow: 0 4px 12px rgba(26,35,126,0.15) !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        #clock div:first-child {
            color: rgba(255, 255, 255, 0.75) !important;
            font-size: 0.85em !important;
            text-transform: uppercase !important;
            letter-spacing: 1.5px !important;
            margin-bottom: 4px !important;
            font-weight: 600 !important;
            background: none !important;
        }
        #displayBackendTime {
            color: #ffffff !important;
            font-size: 2.6em !important;
            font-weight: bold !important;
            font-variant-numeric: tabular-nums !important;
            margin: 0 !important;
            padding: 0 !important;
            background: none !important;
            letter-spacing: 2px !important;
            display: inline-block !important;
        }

        /* --- OCULTAR CABECERA DE TABLA --- */
        .timeSpan.title {
            display: none !important;
        }

        #timespans {
            display: flex !important;
            flex-direction: column !important;
            gap: 14px !important;
            width: 100% !important;
        }

        /* --- TARJETA COMPACTA --- */
        .timeSpan {
            background: white !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 14px !important;
            padding: 16px !important;
            box-shadow: 0 3px 8px rgba(0,0,0,0.03) !important;
            position: relative !important;
            overflow: hidden !important;
            box-sizing: border-box !important;
            width: 100% !important;
            display: grid !important;
            grid-template-columns: auto 1fr !important;
            align-items: center !important;
            column-gap: 12px !important;
            row-gap: 8px !important;
        }

        /* ID de prioridad */
        .timeSpan .prioridad-badge {
            grid-column: 1 !important;
            grid-row: 1 !important;
            background: #e2e8f0 !important;
            color: #475569 !important;
            font-weight: 700 !important;
            border-radius: 6px !important;
            padding: 4px 8px !important;
            font-size: 0.8em !important;
            margin: 0 !important;
            display: inline-block !important;
            justify-self: start !important;
        }

        /* Nombre del modo */
        .timeSpan .nombre-modo {
            grid-column: 2 !important;
            grid-row: 1 !important;
            font-weight: bold !important;
            font-size: 1.25em !important;
            color: #1e293b !important;
            margin: 0 !important;
            text-align: left !important;
        }

        /* Horario: inicio y fin */
        .timeSpan .hora-inicio {
            grid-column: 1 !important;
            grid-row: 2 !important;
            font-size: 0.95em !important;
            color: #64748b !important;
            margin: 8px 0 0 0 !important;
            padding: 0 !important;
            background: none !important;
            display: inline-flex !important;
            align-items: center !important;
            white-space: nowrap !important;
            width: auto !important;
        }
        .timeSpan .hora-inicio::before {
            content: "🕒 Horario: ";
            font-weight: 500;
            margin-right: 4px !important;
        }
        .timeSpan .hora-fin {
            grid-column: 2 !important;
            grid-row: 2 !important;
            font-size: 0.95em !important;
            color: #64748b !important;
            margin: 8px 0 0 0 !important; 
            padding: 0 !important;
            background: none !important;
            display: inline-flex !important;
            align-items: center !important;
            white-space: nowrap !important;
            justify-self: start !important;
            width: auto !important;
        }
        .timeSpan .hora-fin::before {
            content: "a";
            margin-left: 6px !important;
            margin-right: 6px !important;
            color: #64748b !important;
            font-weight: 500 !important;
        }

        /* Estado Activo */
        .timeSpan .estado-activo {
            grid-column: 1 / span 2 !important;
            grid-row: 3 !important;
            font-weight: 600 !important;
            color: #10b981 !important;
            background: #ecfdf5 !important;
            padding: 4px 10px !important;
            border-radius: 6px !important;
            font-size: 0.85em !important;
            margin: 2px 0 0 0 !important;
            justify-self: start !important;
            display: inline-block !important;
        }

        /* Temperatura (clickeable) */
        .timeSpan .temp-display {
            grid-column: 1 / span 2 !important;
            grid-row: 4 !important;
            background: #f1f8e9 !important;
            border: 2px solid #c5e1a5 !important;
            color: #33691e !important;
            font-weight: bold !important;
            padding: 6px 14px !important;
            border-radius: 8px !important;
            font-size: 1em !important;
            margin: 4px 0 0 0 !important;
            justify-self: start !important;
            display: inline-block !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            user-select: none !important;
            min-width: 60px !important;
            text-align: center !important;
            pointer-events: auto !important;
        }
        .timeSpan .temp-display:hover {
            background: #dcedc8 !important;
            transform: scale(1.02) !important;
        }
        .timeSpan .temp-display:active {
            transform: scale(0.98) !important;
        }

        /* Contenedor de edición de temperatura */
        .timeSpan .temp-edit-container {
            grid-column: 1 / span 2 !important;
            grid-row: 4 !important;
            display: none !important;
            margin: 4px 0 0 0 !important;
            gap: 8px !important;
            align-items: center !important;
            flex-wrap: wrap !important;
            justify-self: start !important;
            pointer-events: auto !important;
        }
        .timeSpan .temp-edit-container.active {
            display: flex !important;
        }

        .timeSpan .temp-input-group {
            display: flex !important;
            align-items: center !important;
            gap: 4px !important;
            background: white !important;
            border: 2px solid #4caf50 !important;
            border-radius: 8px !important;
            padding: 2px 8px !important;
        }
        .timeSpan .temp-input-group label {
            font-size: 0.8em !important;
            font-weight: 600 !important;
            color: #475569 !important;
            margin: 0 !important;
        }
        .timeSpan .temp-input-group input {
            width: 40px !important;
            padding: 4px 2px !important;
            border: none !important;
            border-radius: 4px !important;
            font-size: 1em !important;
            font-weight: bold !important;
            text-align: center !important;
            background: transparent !important;
            color: #1e293b !important;
            outline: none !important;
            pointer-events: auto !important;
        }
        .timeSpan .temp-input-group input:focus {
            background: #f0f9ff !important;
            border-radius: 4px !important;
        }
        .timeSpan .temp-input-group .separator {
            font-weight: bold !important;
            color: #94a3b8 !important;
            margin: 0 2px !important;
        }

        .timeSpan .temp-edit-buttons {
            display: flex !important;
            gap: 6px !important;
        }
        .timeSpan .temp-edit-buttons button {
            padding: 4px 12px !important;
            border: none !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            font-size: 0.85em !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            pointer-events: auto !important;
        }
        .timeSpan .temp-edit-buttons .btn-save {
            background: #10b981 !important;
            color: white !important;
        }
        .timeSpan .temp-edit-buttons .btn-save:hover {
            background: #059669 !important;
        }
        .timeSpan .temp-edit-buttons .btn-cancel {
            background: #e2e8f0 !important;
            color: #475569 !important;
        }
        .timeSpan .temp-edit-buttons .btn-cancel:hover {
            background: #cbd5e1 !important;
        }

        .timeSpan .temp-display.hidden {
            display: none !important;
        }

        /* Ocultar campos originales (se usan para almacenar valores) */
        .timeSpan .tempmin, 
        .timeSpan .tempmax,
        .timeSpan .enabled,
        .timeSpan .force,
        .timeSpan .starttime,
        .timeSpan .endtime,
        .timeSpan .name {
            display: none !important;
        }

        /* --- ESTADOS VISUALES --- */
        .timeSpan.tsSelected {
            border-color: #10b981 !important;
            background-color: #f6fdfa !important;
        }
        .timeSpan.tsSelected .prioridad-badge {
            background: #10b981 !important;
            color: white !important;
        }
        .timeSpan.tsSelected::after {
            content: "ACTIVA";
            position: absolute;
            top: 0;
            right: 0;
            background: #10b981;
            color: white;
            font-size: 0.65em;
            font-weight: bold;
            padding: 4px 12px;
            border-bottom-left-radius: 10px;
        }

        .timeSpan.tsForced {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }
        .timeSpan.tsForced .prioridad-badge {
            background: #ef4444 !important;
            color: white !important;
        }
        .timeSpan.tsForced .temp-display {
            background: #ef4444 !important;
            border-color: #ef4444 !important;
            color: white !important;
        }
        .timeSpan.tsForced::after {
            content: "FORZADA";
            position: absolute;
            top: 0;
            right: 0;
            background: #ef4444;
            color: white;
            font-size: 0.65em;
            font-weight: bold;
            padding: 4px 12px;
            border-bottom-left-radius: 10px;
        }

        /* Botón Volver */
        .btn-back {
            display: block !important;
            text-align: center !important;
            background: #e2e8f0 !important;
            color: #334155 !important;
            text-decoration: none !important;
            padding: 12px !important;
            border-radius: 12px !important;
            font-weight: bold !important;
            margin: 25px 0 10px 0 !important;
            font-size: 0.95em !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="container">
            <!-- Reloj -->
            <div id="clock">
                <div>Hora del Servidor</div>
                <div id="displayBackendTime">0000</div>
            </div>

            <!-- Cabecera oculta (se mantiene por compatibilidad) -->
            <div class="timeSpan title">
                <div>Prioridad</div>
                <div>Nombre</div>
                <div>Hora Inicio</div>
                <div>Hora Fin</div>
                <div>Temp Mínima</div>
                <div>Temp Máxima</div>
                <div>Activo</div>
                <div>Forzar</div>
            </div>

            <!-- Render de tarjetas -->
            <div id="timespans"></div>

            <!-- Botón Volver -->
            <a href="index.html" class="btn-back">⬅ Volver al Panel</a>
        </div>
    </div>

    <!-- Script para transformar las filas en tarjetas compactas con edición de temperatura -->
    <script>
        (function() {
            let configurado = false;

            // Formatear hora con ":"
            const formatearConDosPuntos = (texto) => {
                if (!texto) return texto;
                if (/^\d{1,2}:\d{2}$/.test(texto)) return texto;
                let limpio = texto.replace(/[:,\s]/g, '');
                if (limpio.length === 3) return limpio.substring(0, 1) + ":" + limpio.substring(1);
                if (limpio.length === 4) return limpio.substring(0, 2) + ":" + limpio.substring(2);
                if (limpio.length === 2) return limpio.substring(0, 1) + ":" + limpio.substring(1);
                return texto;
            };

            // Transformar las filas generadas por config.js en tarjetas compactas
            const transformarATarjetas = () => {
                const timespans = document.getElementById('timespans');
                if (!timespans) return;

                const filas = timespans.querySelectorAll('.timeSpan:not(.title)');
                if (filas.length === 0) return;

                filas.forEach(fila => {
                    // Extraer datos de los elementos originales
                    const prioridadElem = fila.querySelector('div:first-child');
                    const nombreElem = fila.querySelector('.name') || fila.querySelector('div:nth-child(2)');
                    const inicioElem = fila.querySelector('.starttime') || fila.querySelector('div:nth-child(3)');
                    const finElem = fila.querySelector('.endtime') || fila.querySelector('div:nth-child(4)');
                    const tempMinElem = fila.querySelector('.tempmin') || fila.querySelector('div:nth-child(5)');
                    const tempMaxElem = fila.querySelector('.tempmax') || fila.querySelector('div:nth-child(6)');
                    const activoElem = fila.querySelector('.enabled') || fila.querySelector('div:nth-child(7)');
                    const forzarElem = fila.querySelector('.force') || fila.querySelector('div:nth-child(8)');

                    // Obtener valores
                    const prioridad = prioridadElem ? prioridadElem.textContent.trim() : '1';
                    const nombre = nombreElem ? nombreElem.textContent.trim() : 'Modo';
                    let inicio = inicioElem ? inicioElem.textContent.trim() : '00:00';
                    let fin = finElem ? finElem.textContent.trim() : '00:00';
                    let tempMin = tempMinElem ? tempMinElem.textContent.trim() : '20';
                    let tempMax = tempMaxElem ? tempMaxElem.textContent.trim() : '25';
                    const activo = activoElem ? activoElem.textContent.trim().toLowerCase() === 'true' : true;
                    const forzado = forzarElem ? forzarElem.textContent.trim().toLowerCase() === 'true' : false;

                    // Formatear horas
                    inicio = formatearConDosPuntos(inicio);
                    fin = formatearConDosPuntos(fin);

                    // Limpiar fila y reconstruir como tarjeta
                    fila.innerHTML = '';

                    // Badge prioridad
                    const badge = document.createElement('span');
                    badge.className = 'prioridad-badge';
                    badge.textContent = prioridad;
                    fila.appendChild(badge);

                    // Nombre
                    const nombreSpan = document.createElement('span');
                    nombreSpan.className = 'nombre-modo';
                    nombreSpan.textContent = nombre;
                    fila.appendChild(nombreSpan);

                    // Hora inicio
                    const inicioSpan = document.createElement('span');
                    inicioSpan.className = 'hora-inicio';
                    inicioSpan.textContent = inicio;
                    fila.appendChild(inicioSpan);

                    // Hora fin
                    const finSpan = document.createElement('span');
                    finSpan.className = 'hora-fin';
                    finSpan.textContent = fin;
                    fila.appendChild(finSpan);

                    // Estado activo
                    const estadoSpan = document.createElement('span');
                    estadoSpan.className = 'estado-activo';
                    estadoSpan.textContent = activo ? '✅ Activo' : '⛔ Inactivo';
                    fila.appendChild(estadoSpan);

                    // Display de temperatura (clickeable)
                    const tempDisplay = document.createElement('span');
                    tempDisplay.className = 'temp-display';
                    tempDisplay.textContent = `🌡️ ${tempMin}~${tempMax}`;
                    fila.appendChild(tempDisplay);

                    // Almacenar valores originales en atributos data
                    fila.dataset.tempMin = tempMin;
                    fila.dataset.tempMax = tempMax;
                    fila.dataset.forzado = forzado;

                    // Campos ocultos para mantener compatibilidad con la lógica original
                    const hiddenMin = document.createElement('span');
                    hiddenMin.className = 'tempmin';
                    hiddenMin.textContent = tempMin;
                    hiddenMin.style.display = 'none';
                    fila.appendChild(hiddenMin);

                    const hiddenMax = document.createElement('span');
                    hiddenMax.className = 'tempmax';
                    hiddenMax.textContent = tempMax;
                    hiddenMax.style.display = 'none';
                    fila.appendChild(hiddenMax);

                    const hiddenForzar = document.createElement('span');
                    hiddenForzar.className = 'force';
                    hiddenForzar.textContent = forzado;
                    hiddenForzar.style.display = 'none';
                    fila.appendChild(hiddenForzar);

                    const hiddenActivo = document.createElement('span');
                    hiddenActivo.className = 'enabled';
                    hiddenActivo.textContent = activo;
                    hiddenActivo.style.display = 'none';
                    fila.appendChild(hiddenActivo);

                    const hiddenStart = document.createElement('span');
                    hiddenStart.className = 'starttime';
                    hiddenStart.textContent = inicio;
                    hiddenStart.style.display = 'none';
                    fila.appendChild(hiddenStart);

                    const hiddenEnd = document.createElement('span');
                    hiddenEnd.className = 'endtime';
                    hiddenEnd.textContent = fin;
                    hiddenEnd.style.display = 'none';
                    fila.appendChild(hiddenEnd);

                    const hiddenName = document.createElement('span');
                    hiddenName.className = 'name';
                    hiddenName.textContent = nombre;
                    hiddenName.style.display = 'none';
                    fila.appendChild(hiddenName);

                    // Aplicar clases de estado
                    if (activo) fila.classList.add('tsSelected');
                    if (forzado) fila.classList.add('tsForced');

                    // --- Configurar edición de temperatura ---
                    configurarEdicionTemperatura(fila);
                });

                // Formatear el reloj
                const reloj = document.getElementById("displayBackendTime");
                if (reloj) {
                    const textoOriginal = reloj.innerText.trim();
                    const formateado = formatearConDosPuntos(textoOriginal);
                    if (reloj.innerText !== formateado) {
                        reloj.innerText = formateado;
                    }
                }
            };

            // Configurar la edición de temperatura para una tarjeta
            const configurarEdicionTemperatura = (card) => {
                const tempDisplay = card.querySelector('.temp-display');
                const tempMin = card.querySelector('.tempmin');
                const tempMax = card.querySelector('.tempmax');
                const force = card.querySelector('.force');

                if (!tempDisplay || !tempMin || !tempMax) return;

                // Crear contenedor de edición
                const editContainer = document.createElement('div');
                editContainer.className = 'temp-edit-container';

                // Input mínimo
                const minGroup = document.createElement('div');
                minGroup.className = 'temp-input-group';
                minGroup.innerHTML = `
                    <label>Min</label>
                    <input type="number" class="temp-min-input" min="0" max="60" value="${tempMin.textContent}">
                `;

                // Separador
                const separator = document.createElement('span');
                separator.className = 'separator';
                separator.textContent = '~';

                // Input máximo
                const maxGroup = document.createElement('div');
                maxGroup.className = 'temp-input-group';
                maxGroup.innerHTML = `
                    <label>Max</label>
                    <input type="number" class="temp-max-input" min="0" max="60" value="${tempMax.textContent}">
                `;

                // Botones
                const buttons = document.createElement('div');
                buttons.className = 'temp-edit-buttons';
                buttons.innerHTML = `
                    <button class="btn-save">✓ Guardar</button>
                    <button class="btn-cancel">✕ Cancelar</button>
                `;

                editContainer.appendChild(minGroup);
                editContainer.appendChild(separator);
                editContainer.appendChild(maxGroup);
                editContainer.appendChild(buttons);

                // Insertar después de temp-display
                tempDisplay.parentNode.insertBefore(editContainer, tempDisplay.nextSibling);

                // Referencias
                const container = editContainer;
                const minInput = container.querySelector('.temp-min-input');
                const maxInput = container.querySelector('.temp-max-input');
                const btnSave = container.querySelector('.btn-save');
                const btnCancel = container.querySelector('.btn-cancel');

                // Evento click en temp-display
                tempDisplay.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();

                    // Obtener valores actuales
                    const currentText = this.textContent.trim();
                    const match = currentText.match(/(\d+)~\s*(\d+)/);

                    if (match) {
                        minInput.value = parseInt(match[1]);
                        maxInput.value = parseInt(match[2]);
                    } else {
                        minInput.value = tempMin.textContent || 20;
                        maxInput.value = tempMax.textContent || 25;
                    }

                    // Mostrar edición
                    this.classList.add('hidden');
                    container.classList.add('active');
                    setTimeout(() => minInput.focus(), 100);
                });

                // Guardar cambios
                const guardarCambios = () => {
                    const min = parseInt(minInput.value);
                    const max = parseInt(maxInput.value);

                    if (isNaN(min) || isNaN(max)) {
                        alert('Por favor, ingresa números válidos');
                        return;
                    }

                    if (min < 0 || min > 60 || max < 0 || max > 60) {
                        alert('La temperatura debe estar entre 0 y 60 grados');
                        return;
                    }

                    if (min >= max) {
                        alert('La temperatura mínima debe ser menor que la máxima');
                        minInput.focus();
                        return;
                    }

                    // Actualizar elementos
                    tempDisplay.textContent = `🌡️ ${min}~${max}`;
                    tempMin.textContent = min;
                    tempMax.textContent = max;

                    // Cerrar edición
                    container.classList.remove('active');
                    tempDisplay.classList.remove('hidden');
                };

                // Cancelar
                const cancelarCambios = () => {
                    container.classList.remove('active');
                    tempDisplay.classList.remove('hidden');
                };

                // Eventos de botones
                btnSave.addEventListener('click', function(e) {
                    e.stopPropagation();
                    guardarCambios();
                });

                btnCancel.addEventListener('click', function(e) {
                    e.stopPropagation();
                    cancelarCambios();
                });

                // Teclas
                minInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        maxInput.focus();
                    }
                    if (e.key === 'Escape') cancelarCambios();
                });

                maxInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        guardarCambios();
                    }
                    if (e.key === 'Escape') cancelarCambios();
                });
            };

            // Inicialización
            const inicializar = () => {
                if (configurado) return;
                console.log('🚀 Transformando a tarjetas compactas...');
                transformarATarjetas();
                configurado = true;
                console.log('✅ Configuración completada');
            };

            // Ejecutar después de que config.js cargue
            if (document.readyState === 'complete') {
                setTimeout(inicializar, 300);
            } else {
                document.addEventListener("DOMContentLoaded", () => {
                    setTimeout(inicializar, 300);
                });
            }

            window.addEventListener('load', () => {
                setTimeout(inicializar, 400);
            });

            console.log('📱 Modo tarjetas compactas con edición de temperatura');
        })();
    </script>
</body>
</html>
