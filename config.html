<!-- Restyling Phone Mod V1.5 03072026-->
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termalis Config</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <script src="utils.js" defer></script>
    <script src="config.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* --- Estilos Generales con Ancho al 80% --- */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5 !important;
        margin: 0 !important;
        padding: 20px 10px !important;
        color: #333 !important;
        box-sizing: border-box;
        display: flex !important;
        justify-content: center !important;
      }

      .grid {
        width: 80% !important;
        max-width: 500px !important;
        margin: 0 auto !important;
        display: block !important;
      }
      
      .container {
        width: 100% !important;
        display: block !important;
      }

      /* --- Reloj Superior --- */
      #clock {
        background: #1a237e !important;
        border-radius: 12px !important;
        padding: 16px 10px !important;
        text-align: center !important;
        margin: 0 0 20px 0 !important;
        box-shadow: 0 4px 12px rgba(26,35,126,0.15) !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      #clock div:first-child {
        color: rgba(255, 255, 255, 0.75) !important;
        font-size: 0.85em !important;
        text-transform: uppercase !important;
        letter-spacing: 1.5px !important;
        margin-bottom: 4px !important;
        font-weight: 600 !important;
        background: none !important;
      }
      #displayBackendTime {
        color: #ffffff !important;
        font-size: 2.4em !important;
        font-weight: bold !important;
        font-variant-numeric: tabular-nums !important;
        margin: 0 !important;
        padding: 0 !important;
        background: none !important;
      }

      .timeSpan.title {
        display: none !important;
      }

      #timespans {
        display: flex !important;
        flex-direction: column !important;
        gap: 14px !important;
        width: 100% !important;
      }

      /* --- NUEVO LAYOUT COMPACTO (Estilo Paint) --- */
      .timeSpan {
        background: white !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 14px !important;
        padding: 16px !important;
        box-shadow: 0 3px 8px rgba(0,0,0,0.03) !important;
        position: relative !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
        width: 100% !important;
        
        /* Organizamos los elementos dinámicos mediante una grilla estricta */
        display: grid !important;
        grid-template-columns: auto 1fr !important; /* Columna 1: ID, Columna 2: Nombre */
        align-items: center !important;
        column-gap: 12px !important;
        row-gap: 8px !important;
      }

      /* Celda 1: ID de prioridad (Fila 1, Columna 1) */
      .timeSpan > div:first-child {
        grid-column: 1 !important;
        grid-row: 1 !important;
        background: #e2e8f0 !important;
        color: #475569 !important;
        font-weight: 700 !important;
        border-radius: 6px !important;
        padding: 4px 8px !important;
        font-size: 0.8em !important;
        margin: 0 !important;
        display: inline-block !important;
        justify-self: start !important;
      }

      /* Celda 2: Nombre del modo al lado del ID (Fila 1, Columna 2) */
      .timeSpan .name {
        grid-column: 2 !important;
        grid-row: 1 !important;
        font-weight: bold !important;
        font-size: 1.25em !important;
        color: #1e293b !important;
        margin: 0 !important;
        text-align: left !important;
      }

      /* Celda 3: Horario de inicio (Fila 2, abarca todo el ancho) */
      .timeSpan .starttime {
        grid-column: 1 / span 2 !important;
        grid-row: 2 !important;
        font-size: 0.95em !important;
        color: #64748b !important;
        margin: 2px 0 0 0 !important;
        padding: 0 !important;
        background: none !important;
        display: inline-flex !important;
        align-items: center !important;
        white-space: nowrap !important;
      }
      .timeSpan .starttime::before {
        content: "🕒 Horario: ";
        font-weight: 500;
        margin-right: 4px;
      }

      /* Celda 4: Horario de fin pegado inmediatamente al de inicio */
      .timeSpan .endtime {
        grid-column: 1 / span 2 !important;
        grid-row: 2 !important;
        font-size: 0.95em !important;
        color: #64748b !important;
        margin: 2px 0 0 115px !important; /* Empuje preciso para quedar al lado de starttime */
        padding: 0 !important;
        background: none !important;
        display: inline-flex !important;
        align-items: center !important;
        white-space: nowrap !important;
      }
      .timeSpan .endtime::before {
        content: "  a "; 
        margin-right: 4px;
        color: #64748b;
      }

      /* Celda 5: Estado activo (true / false) (Fila 3) */
      .timeSpan .enabled {
        grid-column: 1 / span 2 !important;
        grid-row: 3 !important;
        font-weight: 600 !important;
        color: #10b981 !important;
        background: #ecfdf5 !important;
        padding: 4px 10px !important;
        border-radius: 6px !important;
        font-size: 0.85em !important;
        margin: 2px 0 0 0 !important;
        justify-self: start !important;
        display: inline-block !important;
      }

      /* Celda 6: Rango de temperaturas (Min ~ Max) (Fila 4) */
      .timeSpan .force {
        grid-column: 1 / span 2 !important;
        grid-row: 4 !important;
        background: #f1f8e9 !important;
        border: 1px solid #c5e1a5 !important;
        color: #33691e !important;
        font-weight: bold !important;
        padding: 6px 14px !important;
        border-radius: 8px !important;
        font-size: 1em !important;
        margin: 4px 0 0 0 !important;
        justify-self: start !important;
        display: inline-block !important;
      }

      /* Escondemos los datos sueltos que rompen todo */
      .timeSpan .tempmin, 
      .timeSpan .tempmax {
        display: none !important;
      }

      /* --- ESTADOS EN EJECUCIÓN (Bordes y Etiquetas de esquina) --- */
      .timeSpan.tsSelected {
        border-color: #10b981 !important;
        background-color: #f6fdfa !important;
      }
      .timeSpan.tsSelected > div:first-child {
        background: #10b981 !important;
        color: white !important;
      }
      .timeSpan.tsSelected::after {
        content: "ACTIVA";
        position: absolute;
        top: 0;
        right: 0;
        background: #10b981;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
      }

      .timeSpan.tsForced {
        border-color: #ef4444 !important;
        background-color: #fef2f2 !important;
      }
      .timeSpan.tsForced > div:first-child {
        background: #ef4444 !important;
        color: white !important;
      }
      .timeSpan.tsForced .force {
        background: #ef4444 !important;
        border-color: #ef4444 !important;
        color: white !important;
      }
      .timeSpan.tsForced::after {
        content: "FORZADA";
        position: absolute;
        top: 0;
        right: 0;
        background: #ef4444;
        color: white;
        font-size: 0.65em;
        font-weight: bold;
        padding: 4px 12px;
        border-bottom-left-radius: 10px;
      }

      /* Botón Volver */
      .btn-back {
        display: block !important;
        text-align: center !important;
        background: #e2e8f0 !important;
        color: #334155 !important;
        text-decoration: none !important;
        padding: 12px !important;
        border-radius: 12px !important;
        font-weight: bold !important;
        margin: 25px 0 10px 0 !important;
        font-size: 0.95em !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="container">
        
        <!-- Reloj -->
        <div id="clock">
          <div>Hora del Servidor</div>
          <div id="displayBackendTime">0000</div>
        </div>

        <!-- Soporte para config.js -->
        <div class="timeSpan title">
          <div>Prioridad</div>
          <div>Nombre</div>
          <div>Hora Inicio</div>
          <div>Hora Fin</div>
          <div>Temp Mínima</div>
          <div>Temp Máxima</div>
          <div>Activo</div>
          <div>Forzar</div>
        </div>

        <!-- Render de tarjetas -->
        <div id="timespans"></div>

        <!-- Botón Volver -->
        <a href="index.html" class="btn-back">⬅ Volver al Panel</a>

      </div>
    </div>
  </body>
</html>
